
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Prompt Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="prompt-display">Click a category to generate a prompt!</h1>
        <div class="categories">
            <div class="category-block" data-category="characters">
                <h2>Characters</h2>
                <p>Generate a unique character concept.</p>
            </div>
            <div class="category-block" data-category="environments">
                <h2>Environments</h2>
                <p>Create a fascinating scene or setting.</p>
            </div>
            <div class="category-block" data-category="objects">
                <h2>Objects</h2>
                <p>Design an intriguing item.</p>
            </div>
            <div class="category-block" data-category="actions">
                <h2>Actions</h2>
                <p>Inspire a dynamic pose or event.</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
